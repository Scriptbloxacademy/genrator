<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FAQ — Genrator</title>
<meta name="description" content="Answers to common questions." />
<meta property="og:title" content="FAQ — Genrator" />
<meta property="og:description" content="Answers to common questions." />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Instrument+Serif&family=Syne:wght@500;700&family=DM+Sans:wght@400;500&family=DM+Serif+Display&family=Work+Sans:wght@400;500&family=Sora:wght@500;700&family=Manrope:wght@400;500&family=Archivo+Black&family=Hind:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #f5f3ee;
  --fg: #0d0d0d;
  --muted: #5b5b55;
  --card: #ffffff;
  --border: #1f1f1f;
  --primary: #0d0d0d;
  --primary-fg: #f5f3ee;
  --accent: #e85d3a;
  --radius: 0px;
  --font-head: 'Instrument Serif', Georgia, serif;
  --font-body: 'Inter', system-ui, sans-serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { background: var(--bg); color: var(--fg); font-family: var(--font-body); line-height: 1.55; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }
.container { width: 100%; max-width: 1120px; margin: 0 auto; padding: 0 24px; }
.container.narrow { max-width: 720px; }
.section { padding: 96px 0; }
.section-tight { padding: 32px 0; }
.eyebrow { font-family: var(--font-body); font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
.eyebrow.center { text-align: center; }
.center { text-align: center; }
.display { font-family: var(--font-head); font-weight: 700; font-size: clamp(40px, 7vw, 88px); line-height: 1.02; letter-spacing: -0.02em; margin: 0 0 24px; text-wrap: balance; }
.h2 { font-family: var(--font-head); font-weight: 700; font-size: clamp(28px, 4vw, 48px); line-height: 1.1; letter-spacing: -0.01em; margin: 0 0 24px; text-wrap: balance; }
.h3 { font-family: var(--font-head); font-weight: 600; font-size: 20px; margin: 16px 0 8px; }
.lead { font-size: clamp(17px, 1.5vw, 20px); color: var(--muted); margin: 0 0 32px; max-width: 60ch; }
.lead.center { margin-left: auto; margin-right: auto; }
.muted { color: var(--muted); }
.small { font-size: 13px; }
.link { color: var(--accent); border-bottom: 1px solid currentColor; }
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 22px; border-radius: var(--radius); font-weight: 600; font-size: 15px; transition: transform .15s ease, box-shadow .15s ease, background .15s ease; border: 2px solid transparent; cursor: pointer; }
.btn-primary { background: var(--primary); color: var(--primary-fg); }
.btn-primary:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0 0 var(--fg); }
.btn-outline { border-color: var(--border); color: var(--fg); background: transparent; }
.btn-outline:hover { border-color: var(--fg); }
.btn-ghost { color: var(--fg); }
.btn-ghost:hover { color: var(--accent); }
.cta-row { display: flex; gap: 16px; flex-wrap: wrap; }
.nav { position: sticky; top: 0; z-index: 50; background: color-mix(in oklab, var(--bg) 88%, transparent); backdrop-filter: saturate(140%) blur(12px); border-bottom: 1px solid var(--border); }
.nav-inner { display: flex; align-items: center; justify-content: space-between; height: 68px; }
.brand { font-family: var(--font-head); font-weight: 700; font-size: 22px; letter-spacing: -0.01em; }
.nav-links { display: flex; gap: 28px; }
.nav-links a { font-size: 14px; color: var(--muted); }
.nav-links a:hover, .nav-links a.active { color: var(--fg); }
.hero-inner { padding: 80px 0 48px; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 24px; padding: 24px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.stat-value { font-family: var(--font-head); font-size: clamp(32px, 4vw, 56px); font-weight: 700; letter-spacing: -0.02em; }
.stat-label { color: var(--muted); font-size: 14px; margin-top: 4px; }
.features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-top: 48px; }
.feature-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; transition: transform .2s, border-color .2s; }
.feature-card:hover { transform: translateY(-4px); border-color: var(--accent); }
.feature-icon { font-size: 28px; color: var(--accent); margin-bottom: 12px; }
.testimonial-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; margin-top: 48px; }
.testimonial { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; margin: 0; }
.testimonial blockquote { font-family: var(--font-head); font-size: 20px; line-height: 1.4; margin: 0 0 16px; }
.pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 24px; margin-top: 48px; }
.price-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; display: flex; flex-direction: column; gap: 16px; }
.price-featured { border-color: var(--primary); border-width: 2px; transform: scale(1.02); }
.price-name { font-family: var(--font-head); font-size: 18px; font-weight: 600; }
.price-amount { font-family: var(--font-head); font-size: 48px; font-weight: 700; letter-spacing: -0.02em; }
.price-amount .muted { font-size: 16px; font-weight: 400; }
.price-features { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; color: var(--muted); }
.price-features li::before { content: "✓ "; color: var(--accent); font-weight: 700; }
.faq { display: flex; flex-direction: column; gap: 8px; margin-top: 32px; }
.faq-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; }
.faq-item summary { cursor: pointer; font-weight: 600; font-family: var(--font-head); list-style: none; }
.faq-item summary::-webkit-details-marker { display: none; }
.faq-item summary::after { content: "+"; float: right; font-size: 22px; line-height: 1; }
.faq-item[open] summary::after { content: "−"; }
.faq-item p { margin: 12px 0 0; }
.contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 24px; margin: 32px 0 48px; padding: 24px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.contact-form { display: flex; flex-direction: column; gap: 12px; }
.contact-form input, .contact-form textarea { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; color: var(--fg); font-family: inherit; font-size: 15px; }
.contact-form input:focus, .contact-form textarea:focus { outline: none; border-color: var(--primary); }
.cta-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 48px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 24px; }
.footer { border-top: 1px solid var(--border); padding: 48px 0; margin-top: 64px; }
.footer-inner { display: flex; flex-wrap: wrap; gap: 24px; justify-content: space-between; align-items: end; }
.footer-links { display: flex; flex-wrap: wrap; gap: 20px; }
.footer-links a { color: var(--muted); font-size: 14px; }
.footer-links a:hover { color: var(--fg); }
.gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
.logos-row { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; opacity: .8; }
.logo-pill { padding: 8px 16px; border: 1px dashed var(--border); border-radius: 999px; font-size: 13px; color: var(--muted); }
@media (max-width: 640px) {
  .section { padding: 64px 0; }
  .nav-links { gap: 16px; }
  .nav-links a { font-size: 13px; }
  .cta-card { padding: 32px; }
}
</style>
</head>

<main>
<section class="section">

        <details class="faq-item"><summary>What is this?</summary><p class="muted">A clear, friendly answer to the question people ask most.</p></details>
        <details class="faq-item"><summary>How do I get started?</summary><p class="muted">Tell people exactly what to do next.</p></details>
    </div>

</section></main>

<footer class="footer">
  <div class="container footer-inner">
    <div>
      <div class="brand">Genrator</div>

    <div class="footer-links">

    </div>
    <div class="muted small">© 2026 Genrator. All rights reserved.</div>
  </div>
</footer>
</body>
</html>
